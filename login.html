<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="lignes"></div>
    <div class="courbe"></div>

    <div class="container">
        <div class="login-section">
            <h2>Login</h2>
            <p><span style="color: white;">........</span>Enter your credentials to access a world of travel</br>
            opportunities, persnalised lineaires, and exclusive deals.</br>
            <span style="color: white;">.......................</span>
            Let's explore the world</p>
            <div class="input-container">
                <i class="fas fa-user"></i>
                <img src="../Photo/user.jpg" width="20" height="20"/>
                <input type="text" id="username">
            </div>
            <div class="input-container">
                <i class="fas fa-key"></i>
                <img src="../Photo/cle.jpg" width="20" height="20"/>
                <input type="password" id="password">
            </div>
            <button onclick="checkLogin()">Login Now</button>
            <div class="error-message" id="error">
                <img src="../Photo/alert.jpg" width="20" height="20">email or password invalid
            </div>
        </div >
        <div class="image-section">

            <img src="../Photo/couple.jpg" class="avionp">
            <img src="../Photo/avion.jpg" class="avion">
        
        
        </div>
    </div>

    <script>
        function checkLogin() {
            var password = document.getElementById('password').value;
            if (password !== '1234' && password !== 'abcd') {
                document.getElementById('error').style.display = 'block';
              

            } else {
                document.getElementById('error').style.display = 'none';
                window.location.href = "../code/bb.html";
            }
        }
    </script>


</body>
</html>
